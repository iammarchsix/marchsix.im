<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARCH SIX | GECƏ</title>
    <style>
        body {
            background-color: #050505; /* Глубокий черный */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .cover {
            width: 250px;
            height: 250px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            object-fit: cover;
        }

        h1 {
            font-size: 24px;
            letter-spacing: 4px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        p {
            color: #888;
            font-size: 14px;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 2px;
        }

        .link-button:hover {
            background: #ffffff;
            color: #000000;
        }

        .footer {
            margin-top: 50px;
            font-size: 11px;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="cover.jpg" alt="GECƏ Cover" class="cover">

        <h1>MARCH SIX</h1>
        <p>GECƏ — OUT SOON</p>

        <div class="links">
            <a href="https://instagram.com/iammarchsix" class="link-button" target="_blank">Instagram</a>
            <a href="https://youtube.com" class="link-button" target="_blank">YouTube</a>
            <a href="https://music.apple.com" class="link-button" target="_blank">Apple Music</a>
            <a href="https://spotify.com" class="link-button" target="_blank">Spotify</a>
            <a href="mailto:booking@marchsix.im" class="link-button">Booking</a>
        </div>

        <div class="footer">
            © 2026 MARCH SIX
        </div>
    </div>

</body>
</html>
