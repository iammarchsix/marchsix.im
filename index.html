<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARCH SIX | GECƏ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            /* Flex-контейнер для всего содержимого с одинаковыми отступами */
            display: flex;
            flex-direction: column;
        }

        .cover {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 15px;
            margin-bottom: 30px;
            object-fit: cover;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        h1 {
            font-size: 28px;
            letter-spacing: 6px;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .status {
            color: #888;
            font-size: 14px;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Главный блок ссылок с общим отступом */
        .all-links-container {
            display: flex;
            flex-direction: column;
            gap: 12px; /* Одинаковое расстояние везде */
        }

        .link-button {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            text-decoration: none;
            padding: 18px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            transition: all 0.2s ease;
        }

        .link-button i {
            font-size: 20px;
            width: 30px;
            margin-right: 15px;
        }

        .link-button span {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .link-button:hover, .social-item:hover {
            background: #ffffff;
            color: #000000;
            transform: scale(1.02);
        }

        /* Сетка соцсетей теперь тоже вписана в общую логику отступов */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px; /* Расстояние между соцсетями такое же, как между кнопками музыки */
        }

        .social-item {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .footer {
            margin-top: 60px;
            font-size: 10px;
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .booking {
            display: block;
            margin-bottom: 10px;
            color: #666;
            text-decoration: none;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="cover.jpg" alt="MARCH SIX" class="cover">

        <h1>MARCH SIX</h1>
        <div class="status">GECƏ — OUT SOON</div>

        <div class="all-links-container">
            <a href="#" class="link-button">
                <i class="fab fa-apple"></i>
                <span>Apple Music</span>
            </a>
            <a href="#" class="link-button">
                <i class="fab fa-youtube"></i>
                <span>YouTube Music</span>
            </a>
            <a href="#" class="link-button">
                <i class="fas fa-music"></i>
                <span>Yandex Music</span>
            </a>
            <a href="#" class="link-button">
                <i class="fab fa-spotify"></i>
                <span>Spotify</span>
            </a>
            <a href="#" class="link-button">
                <i class="fab fa-soundcloud"></i>
                <span>SoundCloud</span>
            </a>

            <div class="social-grid">
                <a href="https://instagram.com/iammarchsix" class="social-item" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social-item" target="_blank"><i class="fab fa-tiktok"></i></a>
                <a href="#" class="social-item" target="_blank"><i class="fab fa-telegram-plane"></i></a>
            </div>
        </div>

        <div class="footer">
            <a href="mailto:booking@marchsix.im" class="booking">booking@marchsix.im</a>
            © 2026 MARCH SIX
        </div>
    </div>

</body>
</html>
