<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GECƏ | March Six</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 40px 20px;
        }
        .container { width: 100%; max-width: 400px; text-align: center; }
        
        /* ОБЛОЖКА */
        .cover {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 15px;
            margin-bottom: 30px;
            object-fit: cover;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        h1 { font-size: 28px; letter-spacing: 6px; margin-bottom: 8px; text-transform: uppercase; }
        .status { color: #888; font-size: 14px; margin-bottom: 40px; letter-spacing: 2px; text-transform: uppercase; }

        /* КНОПКИ МУЗЫКИ */
        .music-links {
            display: flex;
            flex-direction: column;
            gap: 12px; /* Расстояние между кнопками */
        }
        .link-button {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            text-decoration: none;
            padding: 18px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }
        .link-button i { font-size: 20px; width: 30px; margin-right: 15px; }
        .link-button:hover { background: #ffffff; color: #000000; transform: translateY(-2px); }

        /* СЕТКА СОЦСЕТЕЙ */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 12px; /* ИДЕАЛЬНОЕ РАССТОЯНИЕ ОТ SOUNDCLOUD */
        }
        .social-item {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 20px;
            transition: all 0.3s ease;
            text-align: center;
        }
        .social-item:hover { background: #ffffff; color: #000000; }

        .footer { margin-top: 60px; font-size: 10px; color: #444; letter-spacing: 2px; text-transform: uppercase; }
        .booking { display: block; margin-bottom: 10px; color: #666; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="cover.webp" alt="MARCH SIX" class="cover" loading="eager">

        <h1>MARCH SIX</h1>
        <div class="status">GECƏ — OUT SOON</div>

        <div class="music-links">
            <a href="#" class="link-button"><i class="fab fa-apple"></i><span>Apple Music</span></a>
            <a href="https://www.youtube.com/@iammarchsix" class="link-button"><i class="fab fa-youtube"></i><span>YouTube Music</span></a>
            <a href="#" class="link-button"><i class="fas fa-music"></i><span>Yandex Music</span></a>
            <a href="#" class="link-button"><i class="fab fa-spotify"></i><span>Spotify</span></a>
            <a href="https://soundcloud.com/iammarchsix" class="link-button"><i class="fab fa-soundcloud"></i><span>SoundCloud</span></a>
        </div>

        <div class="social-grid">
            <a href="https://instagram.com/iammarchsix" class="social-item"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@iammarchsix" class="social-item"><i class="fab fa-tiktok"></i></a>
            <a href="https://t.me/iammarchsix" class="social-item"><i class="fab fa-telegram"></i></a>
        </div>

        <div class="footer">
            <a href="mailto:booking@marchsix.im" class="booking">booking@marchsix.im</a>
            ©  MARCH SIX 2026
        </div>
    </div>

</body>
</html>
