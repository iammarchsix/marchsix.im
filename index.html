<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARCH SIX | GECƏ</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Roboto', sans-serif; /* Более строгий шрифт */
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 50px 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .cover {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 18px; /* Чуть мягче */
            margin-bottom: 35px;
            object-fit: cover;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            transition: transform 0.3s ease; /* Добавим легкий эффект */
        }

        .cover:hover {
            transform: scale(1.02); /* Чуть увеличивается при наведении */
        }

        h1 {
            font-size: 32px; /* Чуть крупнее */
            letter-spacing: 7px;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .status {
            color: #999;
            font-size: 15px;
            margin-bottom: 50px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* Кнопки музыки — БЛОК */
        .music-links {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Увеличим отступ */
            margin-bottom: 40px;
        }

        .link-button {
            background: #121212; /* Чуть светлее фона */
            border: 1px solid #282828; /* Едва заметная граница */
            color: white;
            text-decoration: none;
            padding: 20px 25px; /* Больше отступ (удобно нажимать) */
            border-radius: 12px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        /* Цветные SVG иконки */
        .link-button img {
            width: 25px; /* Размер иконки */
            height: 25px;
            margin-right: 20px;
            object-fit: contain;
        }

        .link-button span {
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Твой любимый эффект инверсии, но более мягкий */
        .link-button:hover {
            background: #ffffff;
            color: #000000;
            transform: translateY(-3px); /* Чуть всплывает */
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        /* Сетка соцсетей — БЛОК */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px; /* Увеличим отступ */
            margin-top: 30px;
        }

        .social-item {
            background: #121212;
            border: 1px solid #282828;
            color: white;
            padding: 20px; /* Сделаем их квадратными */
            border-radius: 12px;
            font-size: 24px; /* Чуть крупнее */
            transition: all 0.3s ease;
            text-decoration: none;
        }

        /* Иконки соцсетей (оставим их монохромными для баланса) */
        .social-item i {
            display: block;
        }

        .social-item:hover {
            background: #ffffff;
            color: #000000;
            transform: translateY(-3px);
        }

        .footer {
            margin-top: 80px; /* Больше отступ */
            font-size: 11px;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
        }

        .booking {
            display: block;
            margin-bottom: 12px;
            color: #777;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="cover.jpg" alt="MARCH SIX" class="cover">

        <h1>MARCH SIX</h1>
        <div class="status">GECƏ — OUT SOON</div>

        <div class="music-links">
            <a href="#" class="link-button">
                <img src="https://simpleicons.org/icons/applemusic.svg" alt="Apple Music" style="filter: invert(41%) sepia(85%) saturate(2226%) hue-rotate(331deg) brightness(97%) contrast(106%);"> <span>Apple Music</span>
            </a>
            <a href="#" class="link-button">
                <img src="https://simpleicons.org/icons/youtubemusic.svg" alt="YouTube Music" style="filter: invert(13%) sepia(90%) saturate(6750%) hue-rotate(357deg) brightness(101%) contrast(116%);"> <span>YouTube Music</span>
            </a>
            <a href="#" class="link-button">
                <img src="https://simpleicons.org/icons/yandexmusic.svg" alt="Yandex Music" style="filter: invert(72%) sepia(93%) saturate(1633%) hue-rotate(1deg) brightness(107%) contrast(105%);"> <span>Yandex Music</span>
            </a>
            <a href="#" class="link-button">
                <img src="https://simpleicons.org/icons/spotify.svg" alt="Spotify" style="filter: invert(61%) sepia(95%) saturate(413%) hue-rotate(85deg) brightness(92%) contrast(90%);"> <span>Spotify</span>
            </a>
            <a href="#" class="link-button">
                <img src="https://simpleicons.org/icons/soundcloud.svg" alt="SoundCloud" style="filter: invert(53%) sepia(87%) saturate(3620%) hue-rotate(1deg) brightness(103%) contrast(106%);"> <span>SoundCloud</span>
            </a>
        </div>

        <div class="social-grid">
            <a href="https://instagram.com/iammarchsix" class="social-item"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-item"><i class="fab fa-tiktok"></i></a>
            <a href="#" class="social-item"><i class="fab fa-telegram"></i></a>
        </div>

        <div class="footer">
            <a href="mailto:booking@marchsix.im" class="booking">booking@marchsix.im</a>
            © 2026 MARCH SIX
        </div>
    </div>

</body>
</html>
