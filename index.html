<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARCH SIX | GECƏ</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            /* Используем системные шрифты, как на твоем телефоне */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .cover {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 15px;
            margin-bottom: 30px;
            object-fit: cover;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        h1 {
            font-size: 28px;
            letter-spacing: 6px;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .status {
            color: #888;
            font-size: 14px;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Кнопки музыки */
        .music-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .link-button {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            text-decoration: none;
            padding: 15px 20px; /* Немного уменьшил паддинг */
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: start; /* Выравнивание по левому краю */
            transition: all 0.3s ease;
        }

        /* Стиль для твоих оригинальных логотипов */
        .link-button img {
            height: 24px; /* Фиксированная высота для всех лого */
            max-width: 100px; /* Чтобы широкие лого (как Yandex Music) не растягивались */
            margin-right: 15px;
            object-fit: contain; /* Чтобы лого не искажались */
        }

        .link-button span {
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.5px; /* Уменьшил letter-spacing для текста */
        }

        .link-button:hover {
            background: #ffffff;
            color: #000000;
            transform: translateY(-2px);
        }

        /* Инверсия цветов лого при наведении */
        .link-button:hover img {
            filter: invert(1); /* Делаем лого черным, если фон белый */
        }

        /* Сетка соцсетей */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .social-item {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 20px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .social-item:hover {
            background: #ffffff;
            color: #000000;
        }

        .footer {
            margin-top: 60px;
            font-size: 10px;
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .booking {
            display: block;
            margin-bottom: 10px;
            color: #666;
            text-decoration: none;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="cover.jpg" alt="MARCH SIX" class="cover">

        <h1>MARCH SIX</h1>
        <div class="status">GECƏ — OUT SOON</div>

        <div class="music-links">
            <a href="#" class="link-button">
                <img src="icons/apple.png" alt="Apple Music">
                <span>Apple Music</span>
            </a>
            <a href="#" class="link-button">
                <img src="icons/youtube.png" alt="YouTube Music">
                <span>YouTube Music</span>
            </a>
            <a href="#" class="link-button">
                <img src="icons/yandex.png" alt="Yandex Music">
                <span>Yandex Music</span>
            </a>
            <a href="#" class="link-button">
                <img src="icons/spotify.png" alt="Spotify">
                <span>Spotify</span>
            </a>
            <a href="#" class="link-button">
                <img src="icons/soundcloud.png" alt="SoundCloud">
                <span>SoundCloud</span>
            </a>
        </div>

        <div class="social-grid">
            <a href="https://instagram.com/iammarchsix" class="social-item"><img src="icons/instagram.png" alt="Instagram" style="height:20px; width:auto; filter: invert(0);"></a>
            <a href="#" class="social-item"><img src="icons/tiktok.png" alt="TikTok" style="height:20px; width:auto; filter: invert(0);"></a>
            <a href="#" class="social-item"><img src="icons/telegram.png" alt="Telegram" style="height:20px; width:auto; filter: invert(0);"></a>
        </div>

        <div class="footer">
            <a href="mailto:booking@marchsix.im" class="booking">booking@marchsix.im</a>
            © 2026 MARCH SIX
        </div>
    </div>

</body>
</html>
